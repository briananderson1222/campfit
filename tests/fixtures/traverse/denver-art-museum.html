<!DOCTYPE html>
<html lang="en">
<head><title>Summer Camps | Denver Art Museum</title></head>
<body>
  <!--
    Snapshot of the RELOCATED Denver Art Museum summer-camps page
    (denverartmuseum.org/en/summer-camps), captured for the traverse pilot.
    This is the exact rescue case flagged NEEDS REVIEW in
    lib/ingestion/scrapers/denver-arts.ts: the page moved and the markup was
    rebuilt. There is NO .program-item / .camp-item / .event-card / <article>
    card anywhere below — the legacy DenverArtMuseumScraper selectors match
    zero elements and it returns 0 camps. The camp facts are still plainly in
    the visible text, which is what schema-directed traverse extraction reads.

    Traverse 0.5.0+: each <li> below carries a DISTINCT class
    (tile__fact-ages/-dates/-price/-location) rather than a shared one — with
    identical/no classes, traverse's structural chunker (repeated same-tag/
    same-class-signature sibling detection, ADR 0004) mistook this 4-item facts
    list for the page's "repeated card" and chunked around it, dropping the
    heading/category/CTA outside it. Distinct per-fact classes keep this fixture
    on the non-structural (character-window, full-content) chunking path, which
    is what this fixture is actually testing (no real card structure).
  -->
  <main>
    <h1>Summer Camps</h1>
    <section class="camps-listing">
      <div class="tile">
        <h3 class="tile__heading">Young Artists Summer Camp</h3>
        <div class="tile__body">
          <p>Hands-on studio time in painting, sculpture, and printmaking led by working teaching artists in the museum studios.</p>
          <ul class="tile__facts">
            <li class="tile__fact-ages">Ages 7-11</li>
            <li class="tile__fact-dates">July 14-18, 2026</li>
            <li class="tile__fact-price">$385 per week</li>
            <li class="tile__fact-location">Denver, Colorado</li>
          </ul>
          <a class="tile__cta" href="https://www.denverartmuseum.org/en/summer-camps/young-artists">Enroll online</a>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
