services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: campfit_local
      POSTGRES_USER: campfit
      POSTGRES_PASSWORD: campfit_local
    ports:
      - "127.0.0.1:54329:5432"
    volumes:
      - campfit_postgres_data:/var/lib/postgresql/data
      - .:/workspace:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campfit -d campfit_local"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

volumes:
  campfit_postgres_data:

