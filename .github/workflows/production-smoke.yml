name: Production Smoke

on:
  workflow_run:
    workflows:
      - Deploy
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Read-only production smoke
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production-smoke
    env:
      PROD_SMOKE_BASE_URL: ${{ vars.PROD_SMOKE_BASE_URL }}
      PROD_SMOKE_ADMIN_REVIEW_PATH: ${{ vars.PROD_SMOKE_ADMIN_REVIEW_PATH }}
      PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_PROD_ADMIN_EMAIL }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_PROD_ADMIN_PASSWORD }}

    steps:
      - name: Check smoke env
        run: |
          missing=""
          for key in PLAYWRIGHT_ADMIN_EMAIL PLAYWRIGHT_ADMIN_PASSWORD PROD_SMOKE_BASE_URL PROD_SMOKE_ADMIN_REVIEW_PATH; do
            eval "value=\${$key}"
            if [ -z "$value" ]; then
              missing="$missing $key"
            fi
          done

          if [ -n "$missing" ]; then
            echo "Production smoke is misconfigured. Missing:$missing" >&2
            exit 1
          else
            echo "Production smoke configuration present."
          fi

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run production smoke
        run: npm run smoke:prod
