name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    name: Validate TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check content boundary
        run: npm run check:content-boundary

      - name: Check decision registry
        run: npm run check:decisions

      - name: TypeScript compile check
        run: npx tsc --noEmit

      - name: Traverse replay proof (schema-directed extraction pilot)
        run: npm run test:traverse-replay

  render_fetch_proof:
    name: Render-fetch proof (Playwright headless fetch, #41)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Render-fetch proof (local fixture server, no network/DB)
        run: npm run test:render-fetch

  shell_detect_retry_proof:
    name: Shell-detection auto-retry proof (traverse#11)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Shell-detection auto-retry proof (local fixture server, no network/DB)
        run: npm run test:shell-detect-retry

  build:
    name: Next.js production build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    env:
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ vars.RESEND_FROM_EMAIL }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PRICE_ID: ${{ vars.STRIPE_PRICE_ID }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}

    steps:
      - name: Check required build env
        id: preflight
        run: |
          missing=""
          for key in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY PGHOST PGUSER PGPASSWORD CRON_SECRET; do
            eval "value=\${$key}"
            if [ -z "$value" ]; then
              missing="$missing $key"
            fi
          done

          if [ -n "$missing" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping build job. Missing:$missing"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.preflight.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.preflight.outputs.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.preflight.outputs.enabled == 'true'
        run: npm ci

      - name: Build app
        if: steps.preflight.outputs.enabled == 'true'
        run: |
          export NEXT_PUBLIC_APP_URL="${NEXT_PUBLIC_APP_URL:-https://camp.fit}"
          export PGPORT="${PGPORT:-6543}"
          export PGDATABASE="${PGDATABASE:-postgres}"
          export RESEND_FROM_EMAIL="${RESEND_FROM_EMAIL:-CampFit <notifications@example.com>}"
          npm run build

  survey_review_proof:
    name: Survey review proof
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    env:
      ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
      NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}
      PLAYWRIGHT_ADMIN_EMAIL: ${{ secrets.PLAYWRIGHT_ADMIN_EMAIL || secrets.PLAYWRIGHT_PROD_ADMIN_EMAIL }}
      PLAYWRIGHT_ADMIN_PASSWORD: ${{ secrets.PLAYWRIGHT_ADMIN_PASSWORD || secrets.PLAYWRIGHT_PROD_ADMIN_PASSWORD }}
      IS_UNTRUSTED_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify Survey server session and apply contracts
        run: |
          npm run verify:survey-session
          npm run verify:survey-apply
          npm run verify:survey

      - name: Check required browser proof env
        id: browser-preflight
        run: |
          missing=""
          for key in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY PGHOST PGUSER PGPASSWORD PLAYWRIGHT_ADMIN_EMAIL PLAYWRIGHT_ADMIN_PASSWORD; do
            eval "value=\${$key}"
            if [ -z "$value" ]; then
              missing="$missing $key"
            fi
          done

          if [ -n "$missing" ]; then
            if [ "$IS_UNTRUSTED_FORK" = "true" ]; then
              echo "enabled=false" >> "$GITHUB_OUTPUT"
              echo "Skipping Survey browser proof for untrusted fork PR. Missing:$missing"
            else
              echo "Survey browser proof requires:$missing" >&2
              exit 1
            fi
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Write browser proof env file
        if: steps.browser-preflight.outputs.enabled == 'true'
        run: |
          {
            printf 'ADMIN_EMAILS=%s\n' "$ADMIN_EMAILS"
            printf 'NEXT_PUBLIC_APP_URL=%s\n' "${NEXT_PUBLIC_APP_URL:-http://127.0.0.1:3100}"
            printf 'NEXT_PUBLIC_SUPABASE_URL=%s\n' "$NEXT_PUBLIC_SUPABASE_URL"
            printf 'NEXT_PUBLIC_SUPABASE_ANON_KEY=%s\n' "$NEXT_PUBLIC_SUPABASE_ANON_KEY"
            printf 'SUPABASE_SERVICE_ROLE_KEY=%s\n' "$SUPABASE_SERVICE_ROLE_KEY"
            printf 'PGHOST=%s\n' "$PGHOST"
            printf 'PGPORT=%s\n' "${PGPORT:-6543}"
            printf 'PGDATABASE=%s\n' "${PGDATABASE:-postgres}"
            printf 'PGUSER=%s\n' "$PGUSER"
            printf 'PGPASSWORD=%s\n' "$PGPASSWORD"
            printf 'PLAYWRIGHT_ADMIN_EMAIL=%s\n' "$PLAYWRIGHT_ADMIN_EMAIL"
            printf 'PLAYWRIGHT_ADMIN_PASSWORD=%s\n' "$PLAYWRIGHT_ADMIN_PASSWORD"
          } > .env.local

      - name: Install Playwright browser
        if: steps.browser-preflight.outputs.enabled == 'true'
        run: npx playwright install --with-deps chromium

      - name: Verify Survey browser integration
        if: steps.browser-preflight.outputs.enabled == 'true'
        run: npm run verify:survey-browser

  verify_admin:
    name: Verify admin platform
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate
    env:
      PGHOST: ${{ secrets.PGHOST }}
      PGPORT: ${{ secrets.PGPORT }}
      PGDATABASE: ${{ secrets.PGDATABASE }}
      PGUSER: ${{ secrets.PGUSER }}
      PGPASSWORD: ${{ secrets.PGPASSWORD }}

    steps:
      - name: Check required DB env
        id: preflight
        run: |
          missing=""
          for key in PGHOST PGUSER PGPASSWORD; do
            eval "value=\${$key}"
            if [ -z "$value" ]; then
              missing="$missing $key"
            fi
          done

          if [ -n "$missing" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping admin verification. Missing:$missing"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.preflight.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.preflight.outputs.enabled == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        if: steps.preflight.outputs.enabled == 'true'
        run: npm ci

      - name: Verify admin platform
        if: steps.preflight.outputs.enabled == 'true'
        run: |
          export PGPORT="${PGPORT:-6543}"
          export PGDATABASE="${PGDATABASE:-postgres}"
          npm run verify:admin

  review_apply_unit_tests:
    name: Review Apply module tests (vitest, throwaway Postgres)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: campfit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/campfit_test?sslmode=disable

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Provision test database schema
        run: npm run test:db:reset

      - name: Run vitest integration suite
        run: npm run test
