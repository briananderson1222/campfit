name: Weekly Camp Scraper

on:
  schedule:
    # Every Monday at 6am UTC (midnight MT)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (extract but don't write to DB)"
        type: boolean
        default: false
      source:
        description: "Run a specific source (e.g. 'avid4')"
        type: string
        required: false

jobs:
  scrape:
    name: Scrape camp sites
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Provisions headless Chromium for any lib/ingestion/sources.ts entry
      # with `render: true` (traverse 0.13.0's native rendered-fetch seam,
      # campfit#53 spa-ingestion — see docs/decisions/spa-rendered-provider-pages.md).
      # This is the ONLY process in the whole codebase that constructs the
      # real Playwright renderImpl (scripts/scrape.ts) — every Vercel-route
      # crawl trigger (including a Provider.requiresRender:true camp's
      # on-demand recrawl) deliberately leaves it unset and fails closed
      # instead, since only this GitHub Actions execution context can launch
      # a browser. No curated source enables `render: true` yet — this keeps
      # the capability functional the moment one does, without a follow-up
      # workflow change. Cheap (~20-30s) relative to this job's weekly
      # cadence.
      - name: "Install Playwright browser (for render: true sources)"
        run: npx playwright install --with-deps chromium

      - name: Run traverse ingestion pipeline
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          if [ -n "${{ inputs.source }}" ]; then ARGS="$ARGS --source ${{ inputs.source }}"; fi
          npx tsx scripts/scrape.ts $ARGS
        env:
          PGHOST: ${{ secrets.PGHOST }}
          PGPORT: ${{ secrets.PGPORT }}
          PGDATABASE: ${{ secrets.PGDATABASE }}
          PGUSER: ${{ secrets.PGUSER }}
          PGPASSWORD: ${{ secrets.PGPASSWORD }}
          # Traverse's extraction provider is resolved via @kontourai/datum's
          # "extraction-default" role (.datum/config.json -> glm-5.2@zai) —
          # needs ZAI_API_KEY. Full cutover (2026-07): this workflow now does
          # the ENTIRE ingestion sweep (it used to only need PG creds for the
          # CSS-selector scrapers), so this secret must exist in the repo.
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}

      - name: Trigger Vercel revalidation
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          curl -s -X POST "${{ secrets.VERCEL_REVALIDATE_URL }}" || true
